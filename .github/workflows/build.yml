name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'
          cache-disabled: true

      - name: Build
        run: gradle build --no-build-cache --refresh-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: elytrascan-jar
          path: build/libs/elytrascan-*.jar
